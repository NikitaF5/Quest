<style>

  .legend b{color:var(--accent)} .legend .g{color:#5cc98a}

  .wrap svg{display:block;margin:0 auto}
  .note{max-width:920px;margin:18px auto 0;padding:14px 18px;border:1px dashed var(--line);border-radius:14px;

ALL.forEach((m,i)=>{const b=document.createElement('button');b.className='tab'+(i===0?' active':'');

function sel(i){
  const m=ALL[i];
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  const r=document.documentElement.style;
  r.setProperty('--accent',m.accent);r.setProperty('--bgA',m.bgA);r.setProperty('--bgB',m.bgB);
  document.getElementById('eye').textContent='Блюпринт раскладки · FTB Quests · «ёлочка» (fishbone)';
  document.getElementById('title').innerHTML='Схема ветки <span class="ac">'+m.name+'</span>';
  document.getElementById('wrap').innerHTML=m.svg;
  document.getElementById('note').innerHTML='<b>Как читать:</b> якорные узлы 01, 02… образуют горизонтальную спину прогрессии (этапы/фазы мода). От каждого якоря вверх или вниз отходит ветка с квестами этой фазы (направление чередуется), благодаря чему дерево квестов разветвляется, а не идёт одной прямой. Сверху-слева отдельной зелёной пунктирной веткой добавлены <b>повторяемые квесты</b> — их можно проходить многократно ради наград (фарм ресурсов, охота, поставки).';
  window.scrollTo({top:0,behavior:'instant'});
}
sel(0);
