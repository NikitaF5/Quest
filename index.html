<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квестовые ветки — Farmer's Delight · Mekanism · Vampirism · Create · Industrial Upgrade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Rubik:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#2fd6c6; --accent-dim:#1c9488;
    --herb:#8fc26b; --herb-dim:#5f8a47;
    --gold:#f2c14e;
    --cream:#eef3f2; --muted:#9fb0ad; --muted2:#5f7370;
    --board:#16201f; --board2:#1c2b29; --line:#2b3d3b;
    --bgA:#0b1417; --bgB:#0f1d1b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:
      radial-gradient(1200px 600px at 12% -5%, var(--bgB) 0%, transparent 55%),
      radial-gradient(900px 500px at 100% 100%, var(--bgB) 0%, transparent 50%),
      var(--bgA);
    color:var(--cream);
    font-family:'Rubik',system-ui,sans-serif;line-height:1.5;
    padding:0 0 80px;-webkit-font-smoothing:antialiased;
    transition:background .4s ease;
  }

  /* ---- TAB BAR ---- */
  .tabs{
    position:sticky;top:0;z-index:50;
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
    padding:13px 14px;
    background:rgba(8,12,12,.86);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .tab{
    font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;
    letter-spacing:.05em;font-size:13.5px;
    color:var(--muted);background:transparent;
    border:1px solid transparent;border-radius:10px;
    padding:8px 14px;cursor:pointer;transition:.16s;display:flex;align-items:center;gap:8px;
  }
  .tab .tdot{width:10px;height:10px;border-radius:3px;background:var(--td,#888)}
  .tab:hover{color:var(--cream);background:rgba(255,255,255,.04)}
  .tab.active{color:#0c1212;background:var(--td);border-color:var(--td)}
  .tab.active .tdot{background:rgba(0,0,0,.45)}

  /* ---- HERO ---- */
  .hero{position:relative;padding:46px 22px 26px;text-align:center;border-bottom:1px solid var(--line);overflow:hidden}
  .hero::before{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(90deg, color-mix(in srgb, var(--accent) 9%, transparent) 0 2px, transparent 2px 8px);opacity:.5}
  .eyebrow{font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:.32em;text-transform:uppercase;font-size:11.5px;margin-bottom:13px}
  .hero h1{font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    font-size:clamp(28px,6.5vw,54px);line-height:1.03;color:var(--cream);
    text-shadow:0 2px 0 #000, 0 0 26px color-mix(in srgb, var(--accent) 28%, transparent)}
  .hero h1 .ac{color:var(--accent)}
  .hero p.sub{max-width:640px;margin:14px auto 0;color:var(--muted);font-size:14.5px}
  .legend{display:flex;flex-wrap:wrap;gap:9px 18px;justify-content:center;margin:20px auto 0;max-width:720px;
    font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
  .dot-task{background:var(--accent)} .dot-rew{background:var(--herb)} .dot-star{color:var(--gold);font-style:normal}

  /* ---- TIMELINE ---- */
  .timeline{max-width:1180px;margin:0 auto;padding:8px 18px 0;position:relative}
  .stage{position:relative;padding:32px 0 6px}
  .stage::before{content:"";position:absolute;left:26px;top:-8px;bottom:0;width:3px;background:var(--line);border-radius:3px;z-index:0}
  @media(max-width:680px){.stage::before{left:18px}}
  .stage-head{position:relative;z-index:2;display:flex;align-items:center;gap:15px;margin-bottom:18px}
  .stage-num{flex:0 0 auto;width:54px;height:54px;border-radius:14px;display:grid;place-items:center;
    font-family:'Oswald',sans-serif;font-weight:700;font-size:25px;color:#10100c;
    box-shadow:0 0 0 4px var(--bgA), 0 6px 18px rgba(0,0,0,.5)}
  @media(max-width:680px){.stage-num{width:40px;height:40px;font-size:19px;border-radius:11px}}
  .stage-title{display:flex;flex-direction:column;gap:2px}
  .stage-title .tag{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted2)}
  .stage-title h2{font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.03em;font-size:clamp(19px,4.2vw,29px);line-height:1.05}
  .stage-title .desc{color:var(--muted);font-size:13px;max-width:580px}

  .quests{position:relative;z-index:1;margin-left:62px;display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:13px}
  @media(max-width:680px){.quests{margin-left:38px;grid-template-columns:1fr}}

  .q{position:relative;background:linear-gradient(180deg,var(--board2),var(--board));border:1px solid var(--line);
    border-radius:13px;padding:13px 13px 0;overflow:hidden;transition:transform .14s,border-color .14s,box-shadow .14s}
  .q::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);opacity:.85}
  .q:hover{transform:translateY(-3px);border-color:var(--accent-dim);box-shadow:0 10px 24px rgba(0,0,0,.45)}
  .q-top{display:flex;gap:11px;align-items:flex-start}
  .icon{flex:0 0 auto;width:44px;height:44px;border-radius:11px;display:grid;place-items:center;font-size:24px;line-height:1;
    background:#0c0f0e;border:1px solid var(--line);box-shadow:inset 0 0 0 2px color-mix(in srgb,var(--accent) 10%,transparent)}
  .q-headtext{flex:1;min-width:0}
  .q-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:.04em}
  .q-name{font-weight:600;font-size:15px;line-height:1.2;margin-top:2px;color:var(--cream)}
  .stars{margin-top:5px;color:var(--gold);font-size:11.5px;letter-spacing:1px}
  .stars .off{color:var(--muted2)}
  .q-task{font-size:12.5px;color:var(--muted);margin:10px 0 11px}
  .q-task b{color:#cdd8d6;font-weight:500}
  .reward{margin:0 -13px;padding:9px 13px 11px;
    background:linear-gradient(180deg, color-mix(in srgb,var(--herb) 7%,transparent), color-mix(in srgb,var(--herb) 13%,transparent));
    border-top:1px solid color-mix(in srgb,var(--herb) 24%,transparent)}
  .reward .rlabel{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--herb-dim);margin-bottom:4px;display:flex;align-items:center;gap:6px}
  .reward .rlabel::before{content:"";width:8px;height:8px;border-radius:2px;background:var(--herb)}
  .reward .rtext{font-size:12.5px;color:#dde9d4}
  .reward .rtext em{color:var(--herb);font-style:normal;font-weight:600}

  .closing{max-width:900px;margin:46px auto 0;padding:24px 22px;border:1px dashed var(--line);border-radius:16px;background:rgba(0,0,0,.28);text-align:center}
  .closing h3{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em;font-size:19px;color:var(--accent);margin-bottom:8px}
  .closing p{color:var(--muted);font-size:13.5px;max-width:700px;margin:0 auto}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

/* ============ RENDER ============ */
const tabsEl=document.getElementById('tabs');
const board=document.getElementById('board');
const stars=(d)=>{let s="";for(let i=1;i<=5;i++){s+= i<=d?"★":"<span class='off'>★</span>";}return s;};

MODS.forEach((m,idx)=>{
  const b=document.createElement('button');
  b.className='tab'+(idx===0?' active':'');
  b.style.setProperty('--td',m.td);
  b.innerHTML=`<span class="tdot"></span>${m.name}`;
  b.onclick=()=>select(idx);
  tabsEl.appendChild(b);
});

function select(idx){
  const m=MODS[idx];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  const r=document.documentElement.style;
  r.setProperty('--accent',m.theme.accent);
  r.setProperty('--accent-dim',m.theme.accentDim);
  r.setProperty('--bgA',m.theme.bgA);
  r.setProperty('--bgB',m.theme.bgB);
  document.getElementById('eyebrow').textContent=m.eyebrow;
  document.getElementById('title').innerHTML=m.titleHTML;
  document.getElementById('sub').textContent=m.sub;
  document.getElementById('closing-text').textContent=m.closing;

  board.innerHTML='';
  m.stages.forEach(st=>{
    const sec=document.createElement('section');
    sec.className='stage';
    let cards="";
    st.quests.forEach((q,i)=>{
      const id=`${st.n}.${String(i+1).padStart(2,'0')}`;
      cards+=`
        <article class="q">
          <div class="q-top">
            <div class="icon">${q.ic}</div>
            <div class="q-headtext">
              <div class="q-id">КВЕСТ ${id}</div>
              <div class="q-name">${q.name}</div>
              <div class="stars">${stars(q.d)}</div>
            </div>
          </div>
          <div class="q-task"><b>Задача:</b> ${q.task}</div>
          <div class="reward">
            <div class="rlabel">Награда</div>
            <div class="rtext">${q.rew}</div>
          </div>
        </article>`;
    });
    sec.innerHTML=`
      <div class="stage-head">
        <div class="stage-num" style="background:${st.color}">${st.n}</div>
        <div class="stage-title">
          <span class="tag">${st.tag} · ${st.quests.length} квестов</span>
          <h2>${st.title}</h2>
          <span class="desc">${st.desc}</span>
        </div>
      </div>
      <div class="quests">${cards}</div>`;
    board.appendChild(sec);
  });
  window.scrollTo({top:0,behavior:'instant'});
}
select(0);
</script>
